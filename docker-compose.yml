services:
  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - USERS_SERVICE_URL=http://users-service:8001
      - CONTENT_SERVICE_URL=http://content-service:8002
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:8005
      - SUBSCRIPTIONS_SERVICE_URL=http://subscriptions-service:8004
      - RATINGS_SERVICE_URL=http://ratings-service:8003
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8006
      - ANALYTICS_SERVICE_URL=http://analytics-service:8007
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development - API Gateway will use HTTP
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - LOG_DIR=/app/logs
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
      - ./logs/api-gateway:/app/logs
    depends_on:
      - users-service
      - content-service
      - notifications-service
      - subscriptions-service
      - ratings-service
      - recommendation-service
    networks:
      - music-streaming-network

  users-service:
    build:
      context: ./services
      dockerfile: users-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - JWT_SECRET=your-secret-key-change-in-production
      - MONGODB_URI=mongodb://mongodb-users:27017
      - MONGODB_DATABASE=users_db
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - LOG_DIR=/app/logs
      # SMTP Configuration - Using MailHog for development
      # MailHog web UI: http://localhost:8025
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@musicstreaming.com}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
      - ./logs/users-service:/app/logs
    depends_on:
      mongodb-users:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - music-streaming-network

  mongodb-users:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb-users:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - music-streaming-network

  content-service:
    build:
      context: ./services
      dockerfile: content-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - MONGODB_URI=mongodb://mongodb-content:27017
      - MONGODB_DATABASE=music_streaming
      - JWT_SECRET=your-secret-key-change-in-production
      - SUBSCRIPTIONS_SERVICE_URL=http://subscriptions-service:8004
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8006
      - RATINGS_SERVICE_URL=http://ratings-service:8003
      - ANALYTICS_SERVICE_URL=http://analytics-service:8007
      - HDFS_NAMENODE_URL=http://hdfs-namenode:9870
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - LOG_DIR=/app/logs
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
      - ./logs/content-service:/app/logs
    depends_on:
      mongodb-content:
        condition: service_started
      hdfs-namenode:
        condition: service_healthy
    networks:
      - music-streaming-network

  mongodb-content:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - ./data/mongodb-content:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - music-streaming-network

  mongodb-ratings:
    image: mongo:7.0
    ports:
      - "27019:27017"
    volumes:
      - ./data/mongodb-ratings:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - music-streaming-network

  ratings-service:
    build:
      context: ./services
      dockerfile: ratings-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - CONTENT_SERVICE_URL=http://content-service:8002
      - MONGODB_URI=mongodb://mongodb-ratings:27017
      - MONGODB_DATABASE=ratings_db
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8006
      - ANALYTICS_SERVICE_URL=http://analytics-service:8007
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      content-service:
        condition: service_started
      mongodb-ratings:
        condition: service_healthy
    networks:
      - music-streaming-network

  mongodb-subscriptions:
    image: mongo:7.0
    ports:
      - "27020:27017"
    volumes:
      - ./data/mongodb-subscriptions:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - music-streaming-network

  subscriptions-service:
    build:
      context: ./services
      dockerfile: subscriptions-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - CONTENT_SERVICE_URL=http://content-service:8002
      - MONGODB_URI=mongodb://mongodb-subscriptions:27017
      - MONGODB_DATABASE=subscriptions_db
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:8005
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8006
      - ANALYTICS_SERVICE_URL=http://analytics-service:8007
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      content-service:
        condition: service_started
      mongodb-subscriptions:
        condition: service_healthy
      notifications-service:
        condition: service_started
    networks:
      - music-streaming-network

  notifications-service:
    build:
      context: ./services
      dockerfile: notifications-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - CASSANDRA_HOSTS=cassandra:9042
      - CASSANDRA_KEYSPACE=notifications_keyspace
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - music-streaming-network

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    volumes:
      - ./data/cassandra:/var/lib/cassandra
    networks:
      - music-streaming-network
    environment:
      - CASSANDRA_CLUSTER_NAME=MusicStreamingCluster
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  neo4j:
    image: neo4j:5.15
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data/neo4j:/data
    networks:
      - music-streaming-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  recommendation-service:
    build:
      context: ./services
      dockerfile: recommendation-service/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - RATINGS_SERVICE_URL=http://ratings-service:8003
      - SUBSCRIPTIONS_SERVICE_URL=http://subscriptions-service:8004
      - CONTENT_SERVICE_URL=http://content-service:8002
      - ANALYTICS_SERVICE_URL=http://analytics-service:8007
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - music-streaming-network

  analytics-service:
    build:
      context: ./services
      dockerfile: analytics-service/Dockerfile
    ports:
      - "8007:8007"
    environment:
      - PORT=8007
      - MONGODB_URI=mongodb://mongodb-analytics:27017
      - MONGODB_DATABASE=analytics_db
      # TLS_CERT_FILE and TLS_KEY_FILE removed for development
      # - TLS_CERT_FILE=/app/certs/server.crt
      # - TLS_KEY_FILE=/app/certs/server.key
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      mongodb-analytics:
        condition: service_healthy
    networks:
      - music-streaming-network

  mongodb-analytics:
    image: mongo:7.0
    volumes:
      - ./data/mongodb-analytics:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - music-streaming-network

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI port
    networks:
      - music-streaming-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "6831:6831/udp"  # UDP agent
      - "6832:6832/udp"  # UDP agent
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - music-streaming-network

  # HDFS (2.11) - Hadoop Distributed File System for audio files
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-namenode
    environment:
      - CLUSTER_NAME=hadoop-cluster
      - CORE_CONF_fs_defaultFS=hdfs://hdfs-namenode:9000
    ports:
      - "9870:9870"  # NameNode Web UI
      - "9000:9000"  # NameNode RPC
    volumes:
      - ./data/hdfs/namenode:/hadoop/dfs/name
    networks:
      - music-streaming-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-datanode
    environment:
      - SERVICE_PRECONDITION=hdfs-namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://hdfs-namenode:9000
    ports:
      - "9864:9864"  # DataNode Web UI
    volumes:
      - ./data/hdfs/datanode:/hadoop/dfs/data
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    networks:
      - music-streaming-network

networks:
  music-streaming-network:
    driver: bridge

# Volumes are now bind mounts in ./data/ directory
# Data is stored locally and can be shared via git